<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />

    <!-- Primary SEO -->
    <title>High Heels Dance Classes & Courses | Elizabeth Zolotova</title>
    <meta name="description" content="Learn high heels dance with Elizabeth Zolotova. Online and in-person dance classes, private sessions, and professional courses. Book your heels dance class today!" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="High Heels Dance Classes & Courses | Elizabeth Zolotova" />
    <meta name="twitter:description" content="Learn high heels dance with professional dancer Elizabeth Zolotova. Online and in-person classes, private sessions, and dance courses for all levels." />

    <!-- Structured Data: Organization + Dance School -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "DanceSchool",
      "name": "High Heels Dance - Elizabeth Zolotova",
      "url": "https://www.elizabeth-zolotova.com",
      "image": "https://www.elizabeth-zolotova.com/profile-photo.jpeg",
      "description": "Professional high heels dance classes and courses with Elizabeth Zolotova. Online and in-person private and group sessions for all levels.",
      "founder": {
        "@type": "Person",
        "name": "Elizabeth Zolotova",
        "jobTitle": "Professional Dancer & Dance Teacher",
        "url": "https://www.elizabeth-zolotova.com",
        "sameAs": [
          "https://www.instagram.com/elizabeth_zolotova/",
          "https://www.youtube.com/@HighHeelsTutorials",
          "https://www.facebook.com/liza.zolotova.399/"
        ]
      },
      "offers": {
        "@type": "AggregateOffer",
        "priceCurrency": "EUR",
        "availability": "https://schema.org/InStock",
        "offerCount": "100+"
      },
      "sameAs": [
        "https://www.instagram.com/elizabeth_zolotova/",
        "https://www.youtube.com/@HighHeelsTutorials",
        "https://www.facebook.com/liza.zolotova.399/"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["English", "Russian"]
      }
    }
    </script>

    <!-- Structured Data: Courses -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "High Heels Dance Courses",
      "description": "Professional dance courses for all levels - from beginner to advanced high heels choreography",
      "itemListElement": [
        {
          "@type": "Course",
          "name": "High Heels Dance Course",
          "description": "Learn high heels dance choreography with professional instruction. Online and in-person options available.",
          "provider": {
            "@type": "Person",
            "name": "Elizabeth Zolotova"
          },
          "hasCourseInstance": {
            "@type": "CourseInstance",
            "courseMode": ["online", "onsite"],
            "instructor": {
              "@type": "Person",
              "name": "Elizabeth Zolotova"
            }
          }
        }
      ]
    }
    </script>

    <!-- Hero poster preload for instant first paint -->
    <link rel="preload" as="image" href="/hero-poster.webp" type="image/webp" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics: only active when VITE_ANALYTICS_ENDPOINT and VITE_ANALYTICS_WEBSITE_ID are set -->
    <script>
      (function() {
        var ep = "%VITE_ANALYTICS_ENDPOINT%";
        var id = "%VITE_ANALYTICS_WEBSITE_ID%";
        if (ep && id && ep !== "" && id !== "") {
          var s = document.createElement("script");
          s.defer = true;
          s.src = ep + "/umami";
          s.setAttribute("data-website-id", id);
          document.head.appendChild(s);
        }
      })();
    </script>
  </body>

</html>
