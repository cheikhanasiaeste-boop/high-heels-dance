services:
  - type: web
    name: high-heels-dance
    runtime: node
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      # Supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_DATABASE_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      # Admin
      - key: ADMIN_EMAIL
        sync: false
      # Bunny.net Stream
      - key: BUNNY_STREAM_API_KEY
        sync: false
      - key: BUNNY_STREAM_LIBRARY_ID
        sync: false
      - key: BUNNY_STREAM_CDN_HOSTNAME
        sync: false
      - key: BUNNY_STREAM_TOKEN_AUTH_KEY
        sync: false
      # Stripe (add when ready)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
